name: Build Nothing 3a NOS4 Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: Nothing kernel repository
        required: true
        type: string
        default: NothingOSS/android_kernel_msm-6.1_nothing_sm7635
      kernel_ref:
        description: Nothing kernel branch or commit
        required: true
        type: string
        default: sm7635/b/mr
      aosp_manifest_branch:
        description: AOSP kernel manifest branch
        required: true
        type: string
        default: common-android14-6.1-2025-05
      dtc_ref:
        description: AOSP platform/external/dtc branch or tag
        required: true
        type: string
        default: android14-release
      variant:
        description: Nothing build variant
        required: true
        type: choice
        options:
          - consolidate
          - gki
        default: gki
      root_solution:
        description: Root integration mode
        required: true
        type: choice
        options:
          - none
          - sukisu
          - sukisu_susfs
          - resukisu
          - resukisu_susfs
        default: none
      sukisu_ref:
        description: SukiSU-Ultra setup ref
        required: true
        type: string
        default: main
      resukisu_ref:
        description: ReSukiSU setup ref
        required: true
        type: string
        default: main
      enable_kpm:
        description: Enable SukiSU KPM
        required: true
        type: boolean
        default: false
      susfs_branch:
        description: SUSFS branch for this GKI base
        required: true
        type: string
        default: gki-android14-6.1
      upload_artifacts:
        description: Upload logs and build outputs
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout builder
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc \
            bison \
            ccache \
            curl \
            dwarves \
            flex \
            git \
            jq \
            libelf-dev \
            libssl-dev \
            lz4 \
            python3 \
            rsync \
            unzip \
            zip

      - name: Configure ccache
        run: |
          mkdir -p "$HOME/.ccache"
          ccache --max-size=3G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: nothing-3a-nos4-${{ github.event.inputs.variant }}-${{ github.sha }}
          restore-keys: |
            nothing-3a-nos4-${{ github.event.inputs.variant }}-
            nothing-3a-nos4-

      - name: Install repo tool
        run: |
          curl -LSs https://storage.googleapis.com/git-repo-downloads/repo -o repo
          chmod a+x repo
          sudo mv repo /usr/local/bin/repo

      - name: Prepare AOSP kernel workspace
        env:
          KERNEL_REPO: ${{ github.event.inputs.kernel_repo }}
          KERNEL_REF: ${{ github.event.inputs.kernel_ref }}
          AOSP_MANIFEST_BRANCH: ${{ github.event.inputs.aosp_manifest_branch }}
          DTC_REF: ${{ github.event.inputs.dtc_ref }}
        run: bash .github/scripts/prepare-workspace.sh

      - name: Integrate root solution
        if: ${{ github.event.inputs.root_solution != 'none' }}
        env:
          ROOT_SOLUTION: ${{ github.event.inputs.root_solution }}
          SUKISU_REF: ${{ github.event.inputs.sukisu_ref }}
          RESUKISU_REF: ${{ github.event.inputs.resukisu_ref }}
          ENABLE_KPM: ${{ github.event.inputs.enable_kpm }}
          ENABLE_SUSFS: ${{ github.event.inputs.root_solution == 'sukisu_susfs' || github.event.inputs.root_solution == 'resukisu_susfs' }}
        run: bash .github/scripts/integrate-root.sh

      - name: Apply SUSFS patch
        if: ${{ github.event.inputs.root_solution == 'sukisu_susfs' || github.event.inputs.root_solution == 'resukisu_susfs' }}
        env:
          ROOT_SOLUTION: ${{ github.event.inputs.root_solution }}
          SUSFS_BRANCH: ${{ github.event.inputs.susfs_branch }}
        run: bash .github/scripts/apply-susfs.sh

      - name: Build kernel
        env:
          VARIANT: ${{ github.event.inputs.variant }}
        run: bash .github/scripts/build-kernel.sh

      - name: Collect artifacts
        if: always()
        run: bash .github/scripts/collect-artifacts.sh

      - name: Upload minimal artifacts
        if: ${{ always() && github.event.inputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: nothing-3a-nos4-${{ github.event.inputs.root_solution }}-${{ github.event.inputs.variant }}-minimal
          path: artifacts-minimal/
          include-hidden-files: true

      - name: Upload full artifacts
        if: ${{ always() && github.event.inputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: nothing-3a-nos4-${{ github.event.inputs.root_solution }}-${{ github.event.inputs.variant }}-full
          path: artifacts-full/
          include-hidden-files: true
